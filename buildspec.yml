version: 0.2

env:
  variables:
    AWS_REGION: "ap-south-1"
    AWS_ACCOUNT_ID: "143982427845"
    ECR_REPO_NAME: "brain-tasks-app"
    EKS_CLUSTER_NAME: "brain-task-cluster"
    IMAGE_TAG: "latest"

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR"
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - export IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME:$IMAGE_TAG

  build:
    commands:
      - echo "Building Docker image"
      - docker build -t $ECR_REPO_NAME:$IMAGE_TAG .
      - docker tag $ECR_REPO_NAME:$IMAGE_TAG $IMAGE_URI

  post_build:
    commands:
      - echo "Pushing Docker image to ECR"
      - docker push $IMAGE_URI
      - echo "Updating kubeconfig"
      - aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME
      - echo "Updating Kubernetes image"
      - kubectl set image deployment/brain-task-app brain-task-app=$IMAGE_URI
      - echo "Deploying Kubernetes files"
      - kubectl apply -f k8s/
      - kubectl rollout status deployment/brain-task-app
