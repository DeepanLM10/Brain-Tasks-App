apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-task-app
  labels:
    app: brain-task-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: brain-task-app
  template:
    metadata:
      labels:
        app: brain-task-app
    spec:
      containers:
        - name: brain-task-app
          image: REPLACE_IMAGE_URI
          imagePullPolicy: Always
          ports:
            - containerPort: 80
